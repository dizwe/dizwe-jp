<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>일본어 단어장</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="tabs">
        <button class="tab active" data-mode="read">읽기 <span id="read-count"></span></button>
        <button class="tab" data-mode="listen">듣기 <span id="listen-count"></span></button>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text"></div>
    </header>

    <main>
      <div id="card-container">
        <div id="card" class="card">
          <div class="card-front">
            <img id="card-img" src="" alt="하이라이트 구문" />
            <div class="page-badge" id="page-badge"></div>
          </div>
        </div>
      </div>

      <div class="nav-area">
        <div class="counter" id="counter">1 / 1</div>
        <div class="nav-buttons">
          <button id="prev-btn" class="nav-btn">◀</button>
          <button id="unknown-btn" class="result-btn unknown">✗ 모름</button>
          <button id="known-btn" class="result-btn known">✓ 알아</button>
          <button id="next-btn" class="nav-btn">▶</button>
        </div>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="unknown">모르는 것</button>
          <button class="filter-btn" data-filter="known">아는 것</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
